name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

# Only allow one deployment at a time, cancel in-progress runs.
concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout the Codebase
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile --prefer-offline

      - name: Build for Cloudflare
        run: pnpm run build:cloudflare

      # wrangler.toml is gitignored. Generate it from GitHub secrets/variables for CI.
      - name: Generate wrangler.toml
        run: |
          cat > wrangler.toml <<'WRANGLER_EOF'
          name = "${{ vars.CLOUDFLARE_WORKER_NAME || 'stage-flow-tools' }}"
          main = ".output/server/index.mjs"
          compatibility_date = "2025-07-15"

          [vars]
          NUXT_ADMIN_USERNAME = "${{ vars.NUXT_ADMIN_USERNAME || 'admin' }}"
          NUXT_PUBLIC_EMOJI_COOLDOWN_MS = "${{ vars.NUXT_PUBLIC_EMOJI_COOLDOWN_MS || '1500' }}"

          [[kv_namespaces]]
          binding = "STAGE_FLOW_DATA"
          id = "${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}"
          WRANGLER_EOF
          sed -i 's/^          //' wrangler.toml

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # After deploy, reset KV data so the new version starts clean.
      # Admin credentials are preserved (managed via Cloudflare secrets + init-storage).
      - name: Reset questions in KV
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv key put --namespace-id=${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }} "questions" "[]"

      - name: Reset answers in KV
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv key put --namespace-id=${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }} "answers" "[]"
